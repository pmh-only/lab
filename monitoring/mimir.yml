---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: monitoring
data:
  config.yaml: |
    target: all

    multitenancy_enabled: false

    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: warn

    common:
      storage:
        backend: s3
        s3:
          endpoint: minio-service.minio.svc.cluster.local:9000
          bucket_name: mimir
          insecure: true
          bucket_lookup_type: path

    blocks_storage:
      tsdb:
        dir: /data/tsdb

    compactor:
      data_dir: /data/compactor

    limits:
      compactor_blocks_retention_period: 90d

    ingester:
      ring:
        replication_factor: 1

    store_gateway:
      sharding_ring:
        replication_factor: 1

    alertmanager:
      data_dir: /data/alertmanager

    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/alertmanager

    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/ruler
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mimir-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mimir
  namespace: monitoring
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: mimir
  template:
    metadata:
      labels:
        app: mimir
    spec:
      containers:
        - name: mimir
          image: grafana/mimir:latest
          args:
            - -config.file=/etc/mimir/config.yaml
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mimir-secrets
                  key: access_key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mimir-secrets
                  key: secret_key
          ports:
            - containerPort: 9009
              name: http
            - containerPort: 9095
              name: grpc
          readinessProbe:
            httpGet:
              path: /ready
              port: 9009
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: mimir-config
              mountPath: /etc/mimir/config.yaml
              subPath: config.yaml
            - name: mimir-data
              mountPath: /data
      volumes:
        - name: mimir-config
          configMap:
            name: mimir-config
        - name: mimir-data
          persistentVolumeClaim:
            claimName: mimir-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mimir
  namespace: monitoring
spec:
  ports:
    - port: 9009
      targetPort: http
  selector:
    app: mimir
