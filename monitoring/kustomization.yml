apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - ./grafana.yml
  - ./image-renderer.yml
  - ./ksm.yml
  - ./thanos-secrets.yml
  - ./thanos.yml
  - ./ne.yml
  - ./prometheus.yml
  - ./secret.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: monitoring
        namespace: argocd
    target:
      kind: ImageUpdater
