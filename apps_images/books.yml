apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: books
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: books
      images:
        - alias: books-frontend
          imageName: ghcr.io/documentlane/doclane-frontend:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: books-backend
          imageName: ghcr.io/documentlane/doclane-backend:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: books-worker
          imageName: ghcr.io/documentlane/doclane-worker:latest
          commonUpdateSettings:
            updateStrategy: digest
