apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ghost
resources:
  - ./ingress.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: ghost
        namespace: argocd
    target:
      kind: ImageUpdater
