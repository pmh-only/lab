apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: minio
resources:
  - ./secret.yml
  - ./ingress.yml
  - ./certificate.yml
  - ./minio.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: minio
        namespace: argocd
    target:
      kind: ImageUpdater
