apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: minio-tls-secret
  namespace: minio
spec:
  dnsNames:
    - "s3.pmh.codes"
    - "*.s3.pmh.codes"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  secretName: minio-tls-secret
  privateKey:
    algorithm: ECDSA
    size: 384
  usages:
    - digital signature
    - key encipherment
