apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailui
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: mailui
  template:
    metadata:
      labels:
        app: mailui
    spec:
      containers:
        - name: mailui
          image: ghcr.io/pmh-only/mail:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailui-secret
                  key: DATABASE_URL
 
            - name: ORIGIN
              value: https://mail.pmh.codes

            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: mailui-secret
                  key: BETTER_AUTH_SECRET

            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mailui-secret
                  key: OPENAI_API_KEY
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailui-worker
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: mailui-worker
  template:
    metadata:
      labels:
        app: mailui-worker
    spec:
      containers:
        - name: mailui-worker
          image: ghcr.io/pmh-only/mail-worker:latest
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailui-secret
                  key: DATABASE_URL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maildemo
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: maildemo
  template:
    metadata:
      labels:
        app: maildemo
    spec:
      containers:
        - name: maildemo
          image: ghcr.io/pmh-only/mail:latest
          env:
            - name: DEMO_MODE
              value: '1'
