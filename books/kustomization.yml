apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: books
resources:
  - ./backend.yml
  - ./frontend.yml
  - ./worker.yml
  - ./ingress.yml
  - ./secret.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: books
        namespace: argocd
    target:
      kind: ImageUpdater
