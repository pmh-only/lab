apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-backend
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: books-backend
  template:
    metadata:
      labels:
        app: books-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/documentlane/doclane-backend:latest
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: books-secret
                  key: DATABASE_URL
            - name: OIDC_ISSUER_URL
              value: https://auth.pmh.codes/application/o/books/
            - name: OIDC_CLIENT_ID
              value: VC17sf7b6lR03NRuLDiDN1bl69v9bsq1gHhXt6FO
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: books-secret
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_REDIRECT_URI
              value: https://books.pmh.codes/auth/callback
            - name: OIDC_SCOPES
              value: openid email profile
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: books-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_REFRESH_SECRET
              valueFrom:
                secretKeyRef:
                  name: books-secret
                  key: JWT_ACCESS_SECRET
            - name: JWT_ACCESS_TOKEN_EXPIRES_IN_SECONDS
              value: "900"
            - name: JWT_REFRESH_TOKEN_EXPIRES_IN_SECONDS
              value: "1209600"
            - name: REDIS_HOST
              value: redis-service.database.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_DB
              value: "0"
            - name: S3_REGION
              value: us-east-1
            - name: S3_BUCKET
              value: books
            - name: S3_ACCESS_KEY_ID
              value: 0jDlqmJ1r4GcAh1w4BEq
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: books-secret
                  key: S3_SECRET_ACCESS_KEY
            - name: S3_ENDPOINT
              value: https://s3.pmh.codes
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: '0'
            - name: S3_FORCE_PATH_STYLE
              value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: books-backend
spec:
  selector:
    app: books-backend
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
