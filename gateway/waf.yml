apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-nginx-waf-config
  namespace: gateway
data:
  modsecurity.conf: |
    # Remove host header missing rule
    modsecurity_rules 'SecRuleRemoveById 920280';

    # Allow REST/WebDAV methods
    modsecurity_rules 'SecAction "id:9200200,phase:1,nolog,pass,t:none,setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE PROPFIND PROPPATCH MKCOL COPY MOVE LOCK UNLOCK"';

    # Exclude PostHog cookies from MongoDB SQLi rule
    modsecurity_rules 'SecRuleUpdateTargetById 942290 "!REQUEST_COOKIES_NAMES:/^ph_phc_/"';

    # Allow n8n /types/*.json endpoints
    modsecurity_rules 'SecRule REQUEST_FILENAME "@beginsWith \/types\/" "id:9200201,phase:1,pass,nolog,ctl:ruleRemoveById=930130"';

    # Exclude Grafana Prometheus query args from SQLi detection
    modsecurity_rules 'SecRuleUpdateTargetById 942100 "!ARGS:json.queries"';
