apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: gateway
resources:
  - ./certificate.yml
  - ./clusterissuer.yml
  - ./nginx.yml
  - ./envoy.yml
  - ./backend-policy.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: gateway
        namespace: argocd
    target:
      kind: ImageUpdater
