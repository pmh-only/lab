apiVersion: v1
kind: ServiceAccount
metadata:
  name: run-netpol
  namespace: run
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: run-netpol
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: run-netpol
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: run-netpol
subjects:
  - kind: ServiceAccount
    name: run-netpol
    namespace: run
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: run-netpol-script
  namespace: run
data:
  enforce.sh: |
    #!/bin/sh
    apk add --no-cache nftables curl

    CHAIN="RUN-NETPOL"
    SET="RUN-NETPOL-IPS"
    API="https://${KUBERNETES_SERVICE_HOST}/api/v1/namespaces/run/pods?labelSelector=app%3Drun"
    CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

    cleanup() {
      echo "cleaning up nft rules"
      HANDLE=$(nft -a list chain ip mangle FORWARD 2>/dev/null \
        | grep "jump $CHAIN" | grep -o 'handle [0-9]*' | awk '{print $2}')
      [ -n "$HANDLE" ] && nft delete rule ip mangle FORWARD handle "$HANDLE" 2>/dev/null || true
      nft flush chain ip mangle "$CHAIN" 2>/dev/null || true
      nft delete chain ip mangle "$CHAIN" 2>/dev/null || true
      nft flush set ip mangle "$SET" 2>/dev/null || true
      nft delete set ip mangle "$SET" 2>/dev/null || true
      exit 0
    }
    trap cleanup TERM INT

    # Create set and chain if they don't exist
    nft add set ip mangle "$SET" '{ type ipv4_addr; }' 2>/dev/null || true
    nft add chain ip mangle "$CHAIN" 2>/dev/null || true

    # Add static DROP rules referencing the set (only once)
    nft flush chain ip mangle "$CHAIN"
    nft add rule ip mangle "$CHAIN" "ip saddr @${SET} ip daddr 10.0.0.0/8 drop"
    nft add rule ip mangle "$CHAIN" "ip saddr @${SET} ip daddr 172.16.0.0/12 drop"

    # Hook chain into mangle FORWARD if not already present
    nft list chain ip mangle FORWARD 2>/dev/null | grep -q "$CHAIN" || \
      nft insert rule ip mangle FORWARD "jump $CHAIN"

    echo "run-netpol started on $NODE_NAME"

    while true; do
      TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
      IPS=$(curl -sf --cacert "$CACERT" -H "Authorization: Bearer $TOKEN" "$API" \
        | grep -o '"podIP": *"[^"]*"' | grep -o '[0-9.]*' || true)

      # Update set atomically in a single nft transaction — no flush window
      {
        echo "flush set ip mangle $SET"
        for IP in $IPS; do
          echo "add element ip mangle $SET { $IP }"
        done
      } | nft -f -

      sleep 5
    done
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: run-netpol
  namespace: run
spec:
  selector:
    matchLabels:
      app: run-netpol
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: run-netpol
    spec:
      serviceAccountName: run-netpol
      hostNetwork: true
      tolerations:
        - operator: Exists
          effect: NoSchedule
      containers:
        - name: enforcer
          image: alpine:3.21
          command: [/bin/sh, /scripts/enforce.sh]
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: run-netpol-script
            defaultMode: 0755
