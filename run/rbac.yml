apiVersion: v1
kind: ServiceAccount
metadata:
  name: run-app
  namespace: run
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: run-pod-manager
  namespace: run
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "create"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: run-pod-manager
  namespace: run
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: run-pod-manager
subjects:
  - kind: ServiceAccount
    name: run-app
    namespace: run
