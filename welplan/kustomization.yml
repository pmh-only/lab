apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: welplan
resources:
  - ./secret.yml
  - ./deployment.yml
  - ./service.yml
  - ./ingress.yml
  - ./pvc.yml
  - ./images.yml
patches:
  - patch: |
      apiVersion: argocd-image-updater.argoproj.io/v1alpha1
      kind: ImageUpdater
      metadata:
        name: welplan
        namespace: argocd
    target:
      kind: ImageUpdater
