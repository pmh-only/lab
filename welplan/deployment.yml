apiVersion: apps/v1
kind: Deployment
metadata:
  name: welplan
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: welplan
  template:
    metadata:
      labels:
        app: welplan
    spec:
      containers:
        - name: welplan
          image: ghcr.io/pmh-only/welplan2:latest
          env:
            - name: WELSTORY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: WELSTORY_USERNAME
            - name: WELSTORY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: WELSTORY_PASSWORD
            - name: DB_PATH
              value: /data/cache.db
          volumeMounts:
            - mountPath: /data
              name: persistent
      volumes:
        - name: persistent
          persistentVolumeClaim:
            claimName: welplan-pvc
