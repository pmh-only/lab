apiVersion: apps/v1
kind: Deployment
metadata:
  name: welplan
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: welplan
  template:
    metadata:
      labels:
        app: welplan
    spec:
      containers:
        - name: welplan
          image: ghcr.io/pmh-only/welplan2:latest@sha256:18fce213beb1983c95962a9d32ef6b2ef0bce02e8071eaaaa5ad167e0d08bcc4
          env:
            - name: ORIGIN
              value: https://welplan.pmh.codes
            - name: WELPLAN_VERBOSE_LOGS
              value: '1'
            - name: WELSTORY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: WELSTORY_USERNAME
            - name: WELSTORY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: WELSTORY_PASSWORD
            - name: PGHOST
              value: pgsql-service.database.svc.cluster.local
            - name: PGPORT
              value: '5432'
            - name: PGDATABASE
              value: welplan
            - name: PGUSER
              value: welplan
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: PGPASSWORD
            - name: ADMIN_OIDC_DISCOVERY_URL
              value: https://auth.pmh.codes/application/o/welplan/.well-known/openid-configuration
            - name: ADMIN_OIDC_SCOPES
              value: openid profile email
            - name: ADMIN_OIDC_ISSUER_URL
              value: https://auth.pmh.codes/application/o/welplan/
            - name: ADMIN_OIDC_CLIENT_ID
              value: oFx8CL9kOoONKQW7hzMem9c4IN2dYkJ1alN1ihHK
            - name: ADMIN_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: ADMIN_OIDC_CLIENT_SECRET
            - name: REDIS_URL
              value: redis://redis-service.database.svc.cluster.local:6379
            - name: INDEXNOW_KEY
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: INDEXNOW_KEY
            - name: WEBSHARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: welplan-secret
                  key: WEBSHARE_API_TOKEN
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - pmhoci2
                      - pmhoci
