apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitwarden
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: bitwarden
  template:
    metadata:
      labels:
        app: bitwarden
    spec:
      initContainers:
        - name: backpack
          restartPolicy: Always
          image: ghcr.io/pmh-only/backpack-bitwarden2s3:latest
          env:
            - name: TZ
              value: Asia/Seoul
            - name: BW_URL
              value: "https://vault.pmh.codes"
            - name: BW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: BW_PASSWORD
            - name: BW_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: BW_CLIENTID
            - name: BW_CLIENTSECRET
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: BW_CLIENTSECRET
            - name: S3_ENDPOINT_URL
              value: "http://pmhraspberry.tailscale.svc.cluster.local:9000"
            - name: S3_DUMP_URI
              value: bitwarden
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: S3_ACCESS_TOKEN
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: S3_SECRET_TOKEN
            - name: AWS_REGION
              value: us-east-1
      containers:
        - name: bitwarden
          image: ghcr.io/dani-garcia/vaultwarden:latest
          ports:
            - containerPort: 80
          env:
            - name: SIGNUPS_ALLOWED
              value: "false"
            - name: INVITATIONS_ALLOWED
              value: "false"
            - name: PUSH_ENABLED
              value: "true"
            - name: DOMAIN
              value: https://vault.pmh.codes
            - name: SMTP_HOST
              value: mail.mail.svc.cluster.local
            - name: SMTP_FROM
              value: pmh_only@pmh.codes
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_SECURITY
              value: starttls
            - name: SMTP_USERNAME
              value: pmh_only@pmh.codes
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: SMTP_PASSWORD
            - name: SMTP_ACCEPT_INVALID_CERTS
              value: "true"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: ADMIN_TOKEN
            - name: PUSH_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: PUSH_INSTALLATION_ID
            - name: PUSH_INSTALLATION_KEY
              valueFrom:
                secretKeyRef:
                  name: bitwarden-secrets
                  key: PUSH_INSTALLATION_KEY
          volumeMounts:
            - mountPath: /data
              name: bitwarden-storage
      volumes:
        - name: bitwarden-storage
          persistentVolumeClaim:
            claimName: bitwarden-pvc
