apiVersion: apps/v1
kind: Deployment
metadata:
  name: bro
spec:
  revisionHistoryLimit: 0
  selector:
    matchLabels:
      app: bro
  template:
    metadata:
      labels:
        app: bro
    spec:
      serviceAccountName: bro
      containers:
        - name: bro
          image: ghcr.io/pmh-only/bro:latest
          env:
            - name: DISCORD_ALLOWED_ROLE_IDS
              value: '1005814699209785446'
            - name: PROJECTS_FILE
              value: /home/opencode/data/projects.json
            - name: PROJECTS_ROOT
              value: /home/opencode/workspace
            - name: OPENCODE_TASK_TIMEOUT_MS
              value: '7200000'
            - name: OPENCODE_ROUTING_TIMEOUT_MS
              value: '600000'
            - name: 'OPENCODE_PUBLIC_URL'
              value: 'https://opencode.pmh.codes'
            - name: CODE_SERVER_PUBLIC_URL
              value: 'https://ide.pmh.codes'
            - name: OPENCODE_MODEL
              value: openai/gpt-5.6-sol
            - name: OPENCODE_REASONING_EFFORT
              value: xhigh
            - name: DISCORD_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bro-secret
                  key: DISCORD_TOKEN
          volumeMounts:
            - mountPath: /home/opencode
              name: bro-pvc
            - name: docker-sock
              mountPath: /var/run
        - name: dind
          image: docker:29-dind
          securityContext:
            privileged: true
          args:
            - --host=unix:///var/run/docker.sock
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run
      volumes:
        - name: bro-pvc
          persistentVolumeClaim:
            claimName: bro-pvc
        - name: docker-sock
          emptyDir: {}
