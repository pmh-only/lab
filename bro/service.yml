apiVersion: v1
kind: Service
metadata:
  name: bro-service
spec:
  selector:
    app: bro
  ports:
    - name: opencode
      protocol: TCP
      port: 4096
      targetPort: 4096
    - name: threads
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: codeserver
      protocol: TCP
      port: 8081
      targetPort: 8081
