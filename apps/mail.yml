apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mail
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: mail
    server: https://kubernetes.default.svc
  project: default
  source:
    path: mail
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: mail
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: mail
      images:
        - alias: mail
          imageName: ghcr.io/pmh-only/mail:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: mail-worker
          imageName: ghcr.io/pmh-only/mail-worker:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: protonmail-bridge
          imageName: ghcr.io/pmh-only/protonmail-bridge:latest
          commonUpdateSettings:
            updateStrategy: digest
