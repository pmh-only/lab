apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd-image-updater.argoproj.io/image-list: solver=ghcr.io/pmh-only/solver:latest
    argocd-image-updater.argoproj.io/solver.update-strategy: digest
  name: solver
  namespace: argocd
spec:
  destination:
    namespace: solver
    server: https://kubernetes.default.svc
  project: default
  source:
    path: solver
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
