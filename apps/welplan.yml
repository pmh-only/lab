apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: welplan
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: welplan
    server: https://kubernetes.default.svc
  project: default
  source:
    path: welplan
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: welplan
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: welplan
      images:
        - alias: welplan
          imageName: ghcr.io/pmh-only/welplan2:latest
          commonUpdateSettings:
            updateStrategy: digest
