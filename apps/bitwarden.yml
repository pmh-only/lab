apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bitwarden
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: bitwarden
    server: https://kubernetes.default.svc
  project: default
  source:
    path: bitwarden
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: bitwarden
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: bitwarden
      images:
        - alias: vaultwarden
          imageName: ghcr.io/dani-garcia/vaultwarden:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: backpack-bitwarden2s3
          imageName: ghcr.io/pmh-only/backpack-bitwarden2s3:latest
          commonUpdateSettings:
            updateStrategy: digest
