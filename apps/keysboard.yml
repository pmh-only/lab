apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keysboard
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: keysboard
    server: https://kubernetes.default.svc
  project: default
  source:
    path: keysboard
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: keysboard
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: keysboard
      images:
        - alias: keysboard
          imageName: ghcr.io/pmh-only/keysboard:latest
          commonUpdateSettings:
            updateStrategy: digest
