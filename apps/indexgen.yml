apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: indexgen
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: indexgen
    server: https://kubernetes.default.svc
  project: default
  source:
    path: indexgen
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: indexgen
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: indexgen
      images:
        - alias: indexgen
          imageName: ghcr.io/pmh-only/indexgen:latest
          commonUpdateSettings:
            updateStrategy: digest
