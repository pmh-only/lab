apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mntserver
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: mntserver
    server: https://kubernetes.default.svc
  project: default
  source:
    path: mntserver
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: mntserver
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: mntserver
      images:
        - alias: mntserver
          imageName: ghcr.io/pmh-only/mntserver:latest
          commonUpdateSettings:
            updateStrategy: digest
