apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traffic
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: traffic
    server: https://kubernetes.default.svc
  project: default
  source:
    path: traffic
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: traffic
  namespace: argocd
spec:
  writeBackConfig:
    method: "git:secret:argocd/git"
    gitConfig:
      repository: git@github.com:pmh-only/lab.git
      branch: "main"
      writeBackTarget: "kustomization"
  applicationRefs:
    - namePattern: traffic
      images:
        - alias: goaccess
          imageName: ghcr.io/pmh-only/goaccess:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: fluentbit
          imageName: cr.fluentbit.io/fluent/fluent-bit:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: busybox
          imageName: ghcr.io/pmh-only/busybox:latest
          commonUpdateSettings:
            updateStrategy: digest
