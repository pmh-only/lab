apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: workflows
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/workflows.update-strategy: digest
    argocd-image-updater.argoproj.io/image-list: workflows=ghcr.io/n8n-io/n8n:latest
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: workflows
    server: https://kubernetes.default.svc
  project: default
  source:
    path: workflows
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
