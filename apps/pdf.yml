apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pdf
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: stirling=docker.stirlingpdf.com/stirlingtools/stirling-pdf:latest-fat
    argocd-image-updater.argoproj.io/stirling.update-strategy: digest
    argocd-image-updater.argoproj.io/stirling.helm.image-name: image.name
    argocd-image-updater.argoproj.io/stirling.helm.image-tag: image.tag
spec:
  destination:
    namespace: pdf
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: stirling-pdf-chart
    helm:
      valuesObject:
        fullnameOverride: pdf
        image:
        persistence:
          enabled: true
        deployment:
          extraVolumeMounts:
            - name: storage-volume
              mountPath: /usr/share/tessdata
              subPath: tessdata
            - name: storage-volume
              mountPath: /configs
              subPath: configs
            - name: storage-volume
              mountPath: /logs
              subPath: logs
            - name: storage-volume
              mountPath: /pipeline
              subPath: pipeline
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
    repoURL: https://stirling-tools.github.io/Stirling-PDF-chart
    targetRevision: x
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pdf-configs
  namespace: argocd
spec:
  destination:
    namespace: pdf
    server: https://kubernetes.default.svc
  project: default
  source:
    path: pdf_configs
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
