apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trace
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: trace
    server: https://kubernetes.default.svc
  project: default
  source:
    path: trace
    repoURL: git@github.com:pmh-only/lab.git
    targetRevision: HEAD
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: trace
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: trace
      images:
        - alias: rybbit-backend
          imageName: ghcr.io/rybbit-io/rybbit-backend:latest
          commonUpdateSettings:
            updateStrategy: digest
        - alias: rybbit-client
          imageName: ghcr.io/rybbit-io/rybbit-client:latest
          commonUpdateSettings:
            updateStrategy: digest
